x-app-build: &app-build
  context: .
  dockerfile: Dockerfile
  args:
    REQUIREMENTS_FILE: requirements/development.txt

x-django-environment: &django-environment
  DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.development}
  DJANGO_ENVIRONMENT: ${DJANGO_ENVIRONMENT:-development}
  DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-in-development}
  DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
  DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0}
  DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-}
  DJANGO_LOG_LEVEL: ${DJANGO_LOG_LEVEL:-INFO}
  DJANGO_SECURITY_LOG_LEVEL: ${DJANGO_SECURITY_LOG_LEVEL:-INFO}
  DJANGO_ENABLE_FILE_LOGGING: ${DJANGO_ENABLE_FILE_LOGGING:-False}
  DJANGO_LOG_FILE_PATH: ${DJANGO_LOG_FILE_PATH:-logs/blogify.log}
  POSTGRES_DB: ${POSTGRES_DB:-blogify}
  POSTGRES_USER: ${POSTGRES_USER:-blogify}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-blogify}
  POSTGRES_HOST: db
  POSTGRES_PORT: ${POSTGRES_PORT:-5432}
  POSTGRES_CONN_MAX_AGE: ${POSTGRES_CONN_MAX_AGE:-60}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
  CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}

services:
  web:
    build: *app-build
    container_name: blogify-api-web
    environment:
      <<: *django-environment
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - blogify

  celery-worker:
    build: *app-build
    container_name: blogify-api-celery-worker
    command: celery -A config worker --loglevel=${CELERY_LOG_LEVEL:-INFO}
    environment:
      <<: *django-environment
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - blogify

  celery-beat:
    build: *app-build
    container_name: blogify-api-celery-beat
    command: >
      celery -A config beat
      --loglevel=${CELERY_LOG_LEVEL:-INFO}
      --schedule=/tmp/celerybeat-schedule
    environment:
      <<: *django-environment
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - blogify

  db:
    image: postgres:16-alpine
    container_name: blogify-api-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-blogify}
      POSTGRES_USER: ${POSTGRES_USER:-blogify}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-blogify}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - blogify

  redis:
    image: redis:7-alpine
    container_name: blogify-api-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - blogify

volumes:
  postgres_data:
  redis_data:

networks:
  blogify:
    driver: bridge
